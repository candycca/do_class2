<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid World Value Iteration</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>Grid World Value Iteration</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Set Cell Type:</label>
                <div class="radio-group">
                    <input type="radio" id="start" name="tool" value="S" checked>
                    <label for="start" class="btn btn-outline-success">Start (Green)</label>
                    <input type="radio" id="end" name="tool" value="E">
                    <label for="end" class="btn btn-outline-danger">End (Red)</label>
                    <input type="radio" id="block" name="tool" value="B">
                    <label for="block" class="btn btn-outline-dark">Obstacle (Black)</label>
                    <input type="radio" id="clear" name="tool" value="C">
                    <label for="clear" class="btn btn-outline-secondary">Clear</label>
                </div>
            </div>
            
            <div class="action-group">
                <button id="runBtn" class="btn btn-primary">Run Value Iteration</button>
                <button id="resetBtn" class="btn btn-warning">Reset Grid</button>
            </div>
            <div id="status">Ready</div>
        </div>

        <div class="visualization">
            <div class="grid-container" id="grid">
                <!-- Grid items generated by JS -->
            </div>
            
            <div class="legends">
                <div class="legend-item"><span class="box start"></span> Start</div>
                <div class="legend-item"><span class="box end"></span> End</div>
                <div class="legend-item"><span class="box obstacle"></span> Obstacle</div>
                <div class="legend-item"><span class="box path"></span> Optimal Path</div>
            </div>
        </div>
        
        <div class="output-panel">
             <h3>Results</h3>
             <pre id="stats"></pre>
        </div>

    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
