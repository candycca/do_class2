<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid World Value Iteration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Grid World Value Iteration</h1>
        
        <div class="controls">
            <div class="mode-selector">
                <label><input type="radio" name="mode" value="start" checked> Set Start (Green)</label>
                <label><input type="radio" name="mode" value="end"> Set End (Red)</label>
                <label><input type="radio" name="mode" value="obstacle"> Set Obstacle (Black)</label>
                <label><input type="radio" name="mode" value="empty"> Clear Cell</label>
            </div>
            <button onclick="solveGrid()">Run Value Iteration</button>
            <button onclick="resetGrid()">Reset Grid</button>
        </div>

        <div id="grid-container" class="grid-container">
            <!-- Grid cells will be generated by JS -->
        </div>

        <div id="status"></div>
    </div>

    <script>
        const GRID_SIZE = 5;
        let grid = []; // 2D array to store cell types: 'empty', 'start', 'end', 'obstacle'
        let startPos = [0, 0];
        let endPos = [4, 4];
        let obstacles = [[1, 1], [2, 2], [3, 3]];

        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            grid = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                let row = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => handleCellClick(r, c);
                    
                    // Create content wrappers
                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'value';
                    cell.appendChild(valueSpan);
                    
                    const arrowSpan = document.createElement('span');
                    arrowSpan.className = 'arrow';
                    cell.appendChild(arrowSpan);

                    container.appendChild(cell);
                    
                    // Default state logic
                    let type = 'empty';
                    if (r === startPos[0] && c === startPos[1]) type = 'start';
                    else if (r === endPos[0] && c === endPos[1]) type = 'end';
                    else if (obstacles.some(ob => ob[0] === r && ob[1] === c)) type = 'obstacle';
                    
                    row.push(type);
                    updateCellVisuals(r, c, type);
                }
                grid.push(row);
            }
        }

        function updateCellVisuals(r, c, type) {
            const index = r * GRID_SIZE + c;
            const cells = document.getElementsByClassName('cell');
            const cell = cells[index];
            
            // Remove previous classes
            cell.classList.remove('start', 'end', 'obstacle', 'empty');
            cell.classList.add(type);
        }

        function handleCellClick(r, c) {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            
            // Clear previous start/end if setting new one
            if (mode === 'start') {
                // Find old start and clear
                for(let i=0; i<GRID_SIZE; i++) 
                    for(let j=0; j<GRID_SIZE; j++) 
                        if(grid[i][j] === 'start') { grid[i][j] = 'empty'; updateCellVisuals(i, j, 'empty'); }
                
                grid[r][c] = 'start';
                startPos = [r, c];
            } else if (mode === 'end') {
                for(let i=0; i<GRID_SIZE; i++) 
                    for(let j=0; j<GRID_SIZE; j++) 
                        if(grid[i][j] === 'end') { grid[i][j] = 'empty'; updateCellVisuals(i, j, 'empty'); }
                
                grid[r][c] = 'end';
                endPos = [r, c];
            } else if (mode === 'obstacle') {
                if(grid[r][c] !== 'start' && grid[r][c] !== 'end') {
                    grid[r][c] = 'obstacle';
                }
            } else if (mode === 'empty') {
                 if(grid[r][c] !== 'start' && grid[r][c] !== 'end') {
                    grid[r][c] = 'empty';
                }
            }
            updateCellVisuals(r, c, grid[r][c]);
            
            // Update obstacles list
            obstacles = [];
            for(let i=0; i<GRID_SIZE; i++) 
                for(let j=0; j<GRID_SIZE; j++) 
                    if(grid[i][j] === 'obstacle') obstacles.push([i, j]);
        }
        
        async function solveGrid() {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = "Solving...";
            
            const payload = {
                start: startPos,
                end: endPos,
                obstacles: obstacles
            };
            
            try {
                const response = await fetch('/solve', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify(payload) 
                });
                
                const data = await response.json();
                
                // Display Results
                displayResults(data.values, data.policy);
                statusDiv.textContent = "Solved!";
                
            } catch (error) {
                console.error("Error:", error);
                statusDiv.textContent = "Error occurred.";
            }
        }
        
        function displayResults(values, policy) {
            const cells = document.getElementsByClassName('cell');
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const index = r * GRID_SIZE + c;
                    const cell = cells[index];
                    const valueSpan = cell.querySelector('.value');
                    const arrowSpan = cell.querySelector('.arrow');
                    
                    // Show Value (rounded)
                    if (grid[r][c] !== 'obstacle') {
                        valueSpan.textContent = values[r][c].toFixed(2);
                    } else {
                        valueSpan.textContent = '';
                    }

                    // Show Arrow
                    let arrow = '';
                    // Only show arrows for non-terminal, non-obstacle states
                     if (grid[r][c] !== 'end' && grid[r][c] !== 'obstacle') {
                         const action = policy[r][c];
                         if (action === 'UP') arrow = '↑';
                         else if (action === 'DOWN') arrow = '↓';
                         else if (action === 'LEFT') arrow = '←';
                         else if (action === 'RIGHT') arrow = '→';
                     }
                     arrowSpan.textContent = arrow;
                }
            }
        }
        
        function resetGrid() {
            startPos = [0, 0];
            endPos = [4, 4];
            obstacles = [[1, 1], [2, 2], [3, 3]];
            initGrid();
             // Clear values
            const cells = document.getElementsByClassName('cell');
            for(let cell of cells) {
                cell.querySelector('.value').textContent = '';
                cell.querySelector('.arrow').textContent = '';
            }
        }

        window.onload = initGrid;
    </script>
</body>
</html>
